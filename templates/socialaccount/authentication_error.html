{% extends 'base.html' %}

{% block title %}
  Login Failed - Lutris
{% endblock %}

{% block content %}
  <div class="row">
    <div class="col-sm-3"></div>
    <div class="col-sm-6 form-view">
      <h1>Third-Party Login Failed</h1>
      <p>An error occurred while attempting to log in via your third-party account.</p>
      <p>Please try again or use a different sign-in method.</p>
      <a href="{% url 'login' %}" class="btn btn-primary">Back to login</a>
    </div>
    <div class="col-sm-3"></div>
  </div>
{% endblock %}
